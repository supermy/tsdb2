# TSDB2 配置文件 — 高压缩比型
# 适用场景: 长期存储、归档、合规留存
# 特点: 最大化压缩比, 最小化磁盘占用, 可接受较高 CPU 开销
# 预估压缩比: 5-8:1 (相比原始数据)

[storage]
engine = rocksdb
data_dir = ./data

[rocksdb]
cache_size = 268435456
block_size = 8192
write_buffer_size = 268435456
allow_stall = false
cf_write_buffer_size = 67108864
max_write_buffer_number = 4
cf_max_bytes_for_level_base = 268435456
default_retention_secs = 7776000
default_ttl_secs = 31536000

[rocksdb.compression]
l0_l2 = snappy
l3_plus = zstd

[rocksdb.bloom_filter]
bits_per_key = 10
block_based = false
memtable_prefix_bloom_ratio = 0.1

[rocksdb.level0]
compaction_trigger = 4
slowdown_trigger = 20
stop_trigger = 36

[rocksdb.meta_cf]
optimize = true
