# TSDB2 配置文件 — 读取密集型
# 适用场景: 实时仪表盘、告警查询、API 服务后端
# 特点: 低读取延迟, 高查询吞吐, 可接受稍低写入速率
# 预估性能: 写入 ~120K pts/s, 读取 ~250K pts/s

[storage]
engine = rocksdb
data_dir = ./data

[rocksdb]
cache_size = 1073741824
block_size = 8192
write_buffer_size = 268435456
allow_stall = false
cf_write_buffer_size = 67108864
max_write_buffer_number = 4
cf_max_bytes_for_level_base = 268435456
default_retention_secs = 604800
default_ttl_secs = 2592000

[rocksdb.compression]
l0_l2 = none
l3_plus = zstd

[rocksdb.bloom_filter]
bits_per_key = 20
block_based = false
memtable_prefix_bloom_ratio = 0.15

[rocksdb.level0]
compaction_trigger = 4
slowdown_trigger = 20
stop_trigger = 36

[rocksdb.meta_cf]
optimize = true
