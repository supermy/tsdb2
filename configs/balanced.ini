# TSDB2 配置文件 — 均衡型 (默认)
# 适用场景: 通用时序数据, 读写比例约 1:1
# 特点: 读写性能均衡, 适合大多数场景
# 预估性能: 写入 ~175K pts/s, 读取 ~209K pts/s

[storage]
engine = rocksdb
data_dir = ./data

[rocksdb]
cache_size = 536870912
block_size = 4096
write_buffer_size = 268435456
allow_stall = false
cf_write_buffer_size = 67108864
max_write_buffer_number = 4
cf_max_bytes_for_level_base = 268435456
default_retention_secs = 604800
default_ttl_secs = 2592000

[rocksdb.compression]
l0_l2 = none
l3_plus = zstd

[rocksdb.bloom_filter]
bits_per_key = 10
block_based = false
memtable_prefix_bloom_ratio = 0.1

[rocksdb.level0]
compaction_trigger = 4
slowdown_trigger = 20
stop_trigger = 36

[rocksdb.meta_cf]
optimize = true
