# TSDB2 配置文件 — 写入密集型
# 适用场景: IoT 传感器数据采集、日志写入、监控指标采集
# 特点: 大写入吞吐, 可接受稍高读取延迟
# 预估性能: 写入 ~200K pts/s, 读取 ~150K pts/s

[storage]
engine = rocksdb
data_dir = ./data

[rocksdb]
cache_size = 268435456
block_size = 4096
write_buffer_size = 536870912
allow_stall = false
cf_write_buffer_size = 134217728
max_write_buffer_number = 6
cf_max_bytes_for_level_base = 536870912
default_retention_secs = 604800
default_ttl_secs = 2592000

[rocksdb.compression]
l0_l2 = none
l3_plus = zstd

[rocksdb.bloom_filter]
bits_per_key = 10
block_based = false
memtable_prefix_bloom_ratio = 0.05

[rocksdb.level0]
compaction_trigger = 8
slowdown_trigger = 40
stop_trigger = 60

[rocksdb.meta_cf]
optimize = true
