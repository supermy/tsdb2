# TSDB2 配置文件 — 低成本型
# 适用场景: 边缘设备、小型部署、开发测试
# 特点: 低内存占用, 可运行在 2GB RAM 环境
# 预估性能: 写入 ~80K pts/s, 读取 ~100K pts/s

[storage]
engine = rocksdb
data_dir = ./data

[rocksdb]
cache_size = 134217728
block_size = 4096
write_buffer_size = 134217728
allow_stall = true
cf_write_buffer_size = 33554432
max_write_buffer_number = 3
cf_max_bytes_for_level_base = 134217728
default_retention_secs = 259200
default_ttl_secs = 2592000

[rocksdb.compression]
l0_l2 = snappy
l3_plus = zstd

[rocksdb.bloom_filter]
bits_per_key = 10
block_based = true
memtable_prefix_bloom_ratio = 0.05

[rocksdb.level0]
compaction_trigger = 4
slowdown_trigger = 16
stop_trigger = 28

[rocksdb.meta_cf]
optimize = true
