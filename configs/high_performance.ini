# High-performance RocksDB configuration for TSDB2
[rocksdb]
max_open_files=4096
write_buffer_size=134217728
max_write_buffer_number=8
min_write_buffer_number_to_merge=4
level0_file_num_compaction_trigger=16
level0_slowdown_writes_trigger=40
level0_stop_writes_trigger=64
target_file_size_base=134217728
max_bytes_for_level_base=536870912
max_bytes_for_level_multiplier=8
compression=lz4
bottommost_compression=zstd
enable_statistics=true
stats_dump_period_sec=30
increase_parallelism=8

[archiver]
enabled=true
archive_after_secs=3600
parquet_row_group_size=2000000
parquet_compression=zstd

[iceberg]
enabled=true
warehouse_path=./data/iceberg_warehouse
