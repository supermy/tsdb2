name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: "1.85.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check compilation
        run: make build-backend-debug

  test:
    name: Test (TDD)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: make test-unit
      - name: Run integration tests
        run: make test-integration

  test-arrow:
    name: Arrow Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Arrow engine tests
        run: make test-arrow
      - name: Run Arrow engine admin tests
        run: cargo test --lib -p tsdb-admin

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: make clippy
      - name: Check formatting
        run: make fmt-check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tsdb-dashboard/package-lock.json
      - name: Build frontend
        run: make build-frontend

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          working-directory: .

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: make build-backend-debug

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf
      - name: Configure linker for ${{ matrix.target }}
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF
      - name: Cross build ${{ matrix.target }}
        run: cargo build --release -p tsdb-cli --target ${{ matrix.target }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked 2>/dev/null || true
      - name: Run coverage
        run: make coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run stress tests
        run: make test-stress
        timeout-minutes: 30

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: make build-backend
      - name: Run write benchmark
        run: make bench-write BENCH_POINTS=100000
      - name: Run read benchmark
        run: make bench-read BENCH_POINTS=100000
      - name: Archive benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.txt
          retention-days: 30

  e2e:
    name: E2E Test (TDD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: make build
      - name: Start server
        run: |
          make start DATA_DIR=/tmp/tsdb2_e2e PARQUET_DIR=/tmp/tsdb2_e2e_parquet &
          for i in $(seq 1 30); do
            if make status 2>/dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      - name: Generate test data
        run: make test-data-iot
      - name: Demote lifecycle
        run: make test-data-lifecycle
      - name: Check server status
        run: make status
      - name: Run client tests
        run: make client-doctor DATA_DIR=/tmp/tsdb2_e2e
      - name: Stop server
        run: make stop
        if: always()

  e2e-arrow:
    name: E2E Arrow Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: make build-backend-debug
      - name: Start Arrow server
        run: |
          mkdir -p /tmp/tsdb2_arrow_e2e /tmp/tsdb2_arrow_e2e_parquet
          target/debug/tsdb-cli serve \
            --data-dir /tmp/tsdb2_arrow_e2e \
            --parquet-dir /tmp/tsdb2_arrow_e2e_parquet \
            --storage-engine arrow \
            --host 0.0.0.0 \
            --flight-port 50051 \
            --admin-port 8080 \
            --http-port 3000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/services 2>/dev/null; then
              echo "Arrow server is ready"
              break
            fi
            echo "Waiting for Arrow server... ($i/30)"
            sleep 2
          done
      - name: Run Arrow engine tests
        run: make test-arrow
      - name: Stop server
        run: make stop
        if: always()

  release:
    name: Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            make_target: build-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            make_target: build-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            make_target: build-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            make_target: build-windows-amd64
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-arrow, lint, frontend, e2e, e2e-arrow]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross
      - name: Build frontend
        run: make build-frontend
      - name: Build release
        run: make ${{ matrix.make_target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsdb2-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 90
