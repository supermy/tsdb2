name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tsdb2-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tsdb2-linux-arm64
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tsdb2-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: tsdb2-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tsdb2-windows-amd64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        if: "!matrix.use_cross"
        run: cargo test --lib --release

      - name: Run Clippy
        if: "!matrix.use_cross"
        run: cargo clippy --all-targets -- -D warnings

      - name: Check formatting
        if: "!matrix.use_cross"
        run: cargo fmt --all -- --check

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tsdb-dashboard/package-lock.json

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release -p tsdb-cli --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release -p tsdb-cli --target ${{ matrix.target }}

      - name: Build frontend
        if: runner.os != 'Windows'
        run: |
          cd tsdb-dashboard
          npm ci --quiet 2>/dev/null || npm install --quiet
          npm run build

      - name: Build frontend (Windows)
        if: runner.os == 'Windows'
        run: |
          cd tsdb-dashboard
          npm ci --quiet 2>$null; npm install --quiet
          npm run build

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/tsdb2-${VERSION}-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/tsdb-cli dist/tsdb2-${VERSION}-${{ matrix.target }}/
          cp -r tsdb-dashboard/dist dist/tsdb2-${VERSION}-${{ matrix.target }}/dashboard
          cp -r configs dist/tsdb2-${VERSION}-${{ matrix.target }}/
          cp README.md dist/tsdb2-${VERSION}-${{ matrix.target }}/
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz tsdb2-${VERSION}-${{ matrix.target }}
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''
          mkdir dist\tsdb2-$VERSION-${{ matrix.target }}
          cp target\${{ matrix.target }}\release\tsdb-cli.exe dist\tsdb2-$VERSION-${{ matrix.target }}\
          xcopy tsdb-dashboard\dist dist\tsdb2-$VERSION-${{ matrix.target }}\dashboard\ /E /I /Y
          xcopy configs dist\tsdb2-$VERSION-${{ matrix.target }}\configs\ /E /I /Y
          cp README.md dist\tsdb2-$VERSION-${{ matrix.target }}\
          cd dist
          7z a ${{ matrix.artifact }}.zip tsdb2-$VERSION-${{ matrix.target }}
          certutil -hashfile ${{ matrix.artifact }}.zip SHA256 > ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD~20..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: TSDB2 ${{ github.ref_name }}
          body: |
            ## TSDB2 ${{ github.ref_name }}

            ### 下载

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | x86_64 | `tsdb2-linux-amd64.tar.gz` |
            | Linux | aarch64 | `tsdb2-linux-arm64.tar.gz` |
            | macOS | Apple Silicon | `tsdb2-macos-arm64.tar.gz` |
            | macOS | x86_64 | `tsdb2-macos-amd64.tar.gz` |
            | Windows | x86_64 | `tsdb2-windows-amd64.zip` |

            ### 安装

            ```bash
            # Linux/macOS
            tar xzf tsdb2-*.tar.gz
            cd tsdb2-*/
            chmod +x tsdb-cli
            sudo mv tsdb-cli /usr/local/bin/

            # 验证
            tsdb-cli --version
            ```

            ### 变更

            ${{ steps.changelog.outputs.changelog }}

            详见 [CHANGELOG.md](https://github.com/supermy/tsdb2/blob/main/CHANGELOG.md)
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
