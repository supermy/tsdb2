name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tsdb-cli-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tsdb-cli-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tsdb-cli-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tsdb-cli-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tsdb-cli-windows-amd64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release -p tsdb-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tsdb-cli dist/
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz tsdb-cli
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/tsdb-cli.exe dist/
          cd dist
          7z a ${{ matrix.artifact }}.zip tsdb-cli.exe
          certutil -hashfile ${{ matrix.artifact }}.zip SHA256 > ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: TSDB2 ${{ github.ref_name }}
          body: |
            ## TSDB2 ${{ github.ref_name }}

            ### 下载

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | x86_64 | `tsdb-cli-linux-amd64.tar.gz` |
            | Linux | aarch64 | `tsdb-cli-linux-arm64.tar.gz` |
            | macOS | Apple Silicon | `tsdb-cli-macos-arm64.tar.gz` |
            | macOS | x86_64 | `tsdb-cli-macos-amd64.tar.gz` |
            | Windows | x86_64 | `tsdb-cli-windows-amd64.zip` |

            ### 安装

            ```bash
            # Linux/macOS
            tar xzf tsdb-cli-*.tar.gz
            chmod +x tsdb-cli
            sudo mv tsdb-cli /usr/local/bin/

            # 验证
            tsdb-cli --version
            ```

            ### 变更

            - 首个公开版本
            - RocksDB + Parquet 双存储引擎
            - DataFusion SQL 查询
            - CLI 工具 (status/query/bench/compact/import/archive/export/doctor)
            - 三级 TTL 清理
            - 一致性快照
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
